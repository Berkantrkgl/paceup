name: Deploy to Hetzner

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "chatapi/**"
      - "docker-compose.prod.yml"
      - "Caddyfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to (re)deploy"
        type: choice
        default: all
        options: [all, django, graph-api, caddy]

concurrency:
  group: deploy-paceup
  cancel-in-progress: false

jobs:
  # Detect which parts changed so we only rebuild what's needed.
  changes:
    runs-on: ubuntu-latest
    outputs:
      django: ${{ steps.filter.outputs.django }}
      graph: ${{ steps.filter.outputs.graph }}
      caddy: ${{ steps.filter.outputs.caddy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            django:
              - 'backend/**'
              - 'docker-compose.prod.yml'
            graph:
              - 'chatapi/**'
              - 'docker-compose.prod.yml'
            caddy:
              - 'Caddyfile'
              - 'docker-compose.prod.yml'

  deploy:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DISPATCH_SERVICE: ${{ github.event.inputs.service }}
          CH_DJANGO: ${{ needs.changes.outputs.django }}
          CH_GRAPH: ${{ needs.changes.outputs.graph }}
          CH_CADDY: ${{ needs.changes.outputs.caddy }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          command_timeout: 20m
          envs: DISPATCH_SERVICE,CH_DJANGO,CH_GRAPH,CH_CADDY
          script: |
            set -euo pipefail
            REPO=/home/deploy/paceup/paceup
            # Run from the repo dir with a fixed project name so it reuses the
            # existing caddy TLS volumes (paceup_caddy-data/-config) and reads
            # .env.django / .env.graph / .env.caddy that live in the repo dir.
            cd "$REPO"
            COMPOSE="docker compose -p paceup -f docker-compose.prod.yml"

            echo "→ git pull (main)"
            git fetch origin main
            git reset --hard origin/main
            git log -1 --oneline

            # Decide which services to rebuild.
            # On manual dispatch, honor the chosen service; otherwise use path-filter outputs.
            SERVICES=""
            if [ -n "${DISPATCH_SERVICE:-}" ] && [ "${DISPATCH_SERVICE}" != "all" ]; then
              SERVICES="${DISPATCH_SERVICE}"
            elif [ "${DISPATCH_SERVICE:-}" = "all" ]; then
              SERVICES="caddy django graph-api"
            else
              [ "${CH_CADDY}"  = "true" ] && SERVICES="$SERVICES caddy"
              [ "${CH_DJANGO}" = "true" ] && SERVICES="$SERVICES django"
              [ "${CH_GRAPH}"  = "true" ] && SERVICES="$SERVICES graph-api"
            fi
            SERVICES="$(echo "$SERVICES" | xargs || true)"

            if [ -z "$SERVICES" ]; then
              echo "→ no relevant changes; nothing to rebuild"
              exit 0
            fi
            echo "→ rebuilding: $SERVICES"
            # --no-deps: only (re)create the named service(s); leave the rest
            # untouched. Without it, depends_on would also recreate dependencies
            # (e.g. rebuilding graph-api would restart django too).
            $COMPOSE up -d --build --no-deps $SERVICES

            # Health-check the app services (caddy has no healthcheck).
            for svc in $SERVICES; do
              case "$svc" in django) cname=paceup-django-1 ;; graph-api) cname=paceup-graph-api-1 ;; *) continue ;; esac
              echo "→ wait for $svc healthcheck"
              STATUS="starting"
              for i in $(seq 1 24); do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$cname" 2>/dev/null || echo "starting")
                echo "  [$i/24] $svc=$STATUS"
                [ "$STATUS" = "healthy" ] && break
                sleep 5
              done
              if [ "$STATUS" != "healthy" ]; then
                echo "ERROR: $svc unhealthy after 120s"
                $COMPOSE logs "$svc" --tail 50
                exit 1
              fi
            done
            echo "✓ deploy ok"
