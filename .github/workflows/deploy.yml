name: Deploy Django to Hetzner

on:
  push:
    branches: [master]
    paths:
      - "apps/**"
      - "paceupbackend/**"
      - "docker/**"
      - "Dockerfile.django"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-django
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /home/deploy/paceup/paceup-backend
            echo "→ git pull"
            git fetch origin master
            git reset --hard origin/master
            git log -1 --oneline
            cd /home/deploy/paceup
            echo "→ rebuild django container"
            docker compose up -d --build django
            echo "→ wait for healthcheck"
            STATUS="starting"
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' paceup-django-1 2>/dev/null || echo "starting")
              echo "  [$i/24] health=$STATUS"
              if [ "$STATUS" = "healthy" ]; then break; fi
              sleep 5
            done
            echo "→ final state"
            docker compose ps django
            if [ "$STATUS" != "healthy" ]; then
              echo "ERROR: django unhealthy after 120s"
              docker compose logs django --tail 50
              exit 1
            fi
            echo "✓ deploy ok"
