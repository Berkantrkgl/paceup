services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: paceup
      POSTGRES_USER: paceup
      POSTGRES_PASSWORD: paceup_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paceup -d paceup"]
      interval: 5s
      timeout: 3s
      retries: 10

  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-change-me
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,django"
      DATABASE_URL: postgres://paceup:paceup_dev@db:5432/paceup
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-central-1}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
