services:
  graph-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-me}
      DB_URI: ${DB_URI:-postgresql://paceup:paceup_dev@host.docker.internal:5432/paceup}
      BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:8000/api}
      BACKEND_HTTP_TIMEOUT: "30"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-central-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
